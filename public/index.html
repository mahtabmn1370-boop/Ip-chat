<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Chat Name</title>
    <link rel="stylesheet" href="styles.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body data-theme="dark">
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🔌</span>
            <h1>IP Chat Name</h1>
        </div>
        <div class="header-right">
            <button onclick="toggleTheme()" class="theme-btn" title="Toggle Theme">🌙</button>
            <div id="header-room-info" class="room-info hidden">
                <span class="room-label">Room</span>
                <span id="room-id-display" class="room-id"></span>
                <button onclick="copyRoomLink()" class="copy-btn">📋 Share</button>
                <button onclick="exitRoom()" class="exit-btn">Exit Room</button>
            </div>
        </div>
    </header>

    <!-- Home View -->
    <div id="home-view" class="view active">
        <div class="home-container">
            <div class="hero">
                <div class="hero-badge">PRIVATE • 2 USERS • IP TRACKED</div>
                <h2 class="hero-title">Chat That You Control</h2>
                <p class="hero-subtitle">Create private room • Only Exit button deletes room</p>
            </div>

            <div class="card">
                <div class="input-group">
                    <label for="nickname-input">Your nickname</label>
                    <input type="text" id="nickname-input" placeholder="e.g. Alex" maxlength="20">
                </div>

                <div class="create-options">
                    <button onclick="createRoom()" class="btn-primary">Create Private Room (2 users)</button>
                </div>

                <div class="expiry-selector">
                    <label>Keep room open for</label>
                    <select id="expiry-time">
                        <option value="30" selected>30 minutes</option>
                        <option value="60">1 hour</option>
                        <option value="180">3 hours</option>
                    </select>
                </div>

                <div class="divider"><span>OR</span></div>

                <div class="input-group">
                    <label for="room-code-input">Enter Room ID</label>
                    <div class="join-input-wrapper">
                        <input type="text" id="room-code-input" placeholder="ABC12345" maxlength="8" style="text-transform:uppercase;">
                        <button onclick="joinRoomFromHome()" class="btn-secondary">Join →</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view" class="view hidden">
        <div class="chat-layout">
            <div class="participants-sidebar">
                <h3 class="sidebar-title">Participants <span id="participant-count" class="count-badge">1/2</span></h3>
                <div id="participants-list" class="participants-list"></div>
            </div>

            <div class="chat-main">
                <div id="chat-messages" class="messages-container">
                    <div id="empty-chat" class="empty-state">
                        <h3>Start the conversation</h3>
                    </div>
                </div>

                <div id="typing-indicator" class="typing-indicator hidden">
                    <span id="typing-name"></span> is typing...
                </div>

                <div class="message-input-area">
                    <form id="message-form" onsubmit="sendMessage(event)">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off"
                               onkeyup="handleTyping(event)">
                        <button type="button" onclick="triggerFileUpload()" class="attach-btn">📎</button>
                        <button type="submit" class="send-btn">Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-upload" accept="image/*,audio/*,video/*" style="display:none" onchange="handleFileSelect(event)">

    <!-- Modals -->
    <div id="join-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Joining Room <span id="modal-room-id"></span></h2>
            <input type="text" id="modal-nickname" placeholder="Your nickname" maxlength="20">
            <div class="modal-actions">
                <button onclick="cancelJoinModal()" class="btn-secondary">Cancel</button>
                <button onclick="confirmJoinFromModal()" class="btn-primary">Join</button>
            </div>
        </div>
    </div>

    <div id="closed-modal" class="modal hidden">
        <div class="modal-content error-modal">
            <h2>Room Closed</h2>
            <p id="closed-reason"></p>
            <button onclick="goBackToHome()" class="btn-primary">Back to Home</button>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
</body>
                                                        </html>
